name: CI
# Thin caller of kalbasit/gh-actions' reusable CI workflow.
# Pinned to @main while iterating; will repin to @v0.1.0 once tagged.
on:
  pull_request:
    branches:
      - main
      - "release-*"
  push:
    branches:
      - main
      - "release-*"
  workflow_dispatch:
concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true
permissions:
  contents: read
  packages: write
jobs:
  ci:
    uses: kalbasit/gh-actions/.github/workflows/ci.yml@main
    with:
      cachix_cache: signal-api-receiver
      oci: true
      primary_package: signal-api-receiver
      dockerhub_image: kalbasit/signal-api-receiver
      dockerhub_username: ${{ vars.DOCKERHUB_USERNAME }}
      languages: |
        {"go":{"targets":[{"attr":"signal-api-receiver","file":"nix/packages/signal-api-receiver/default.nix"}]}}
    secrets:
      cachix_auth_token: ${{ secrets.CACHIX_AUTH_TOKEN }}
      gha_pat_token: ${{ secrets.GHA_PAT_TOKEN }}
      codecov_token: ${{ secrets.CODECOV_TOKEN }}
      dockerhub_token: ${{ secrets.DOCKERHUB_TOKEN }}
