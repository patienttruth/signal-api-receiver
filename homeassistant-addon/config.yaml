name: "Signal API Receiver"
description: "A lightweight wrapper that consumes the websocket stream from signal-cli-rest-api and exposes a REST API for Home Assistant to receive Signal messages."
version: "0.0.4"
slug: "signal_api_receiver"
url: "https://github.com/kalbasit/signal-api-receiver"
init: false

arch:
  - aarch64
  - amd64

ports:
  8105/tcp: 8105

ports_description:
  8105/tcp: "Signal API Receiver REST API"

options:
  signal_api_url: "ws://localhost:8080"
  signal_account: ""
  server_address: ":8105"
  repeat_last_message: false
  record_message_type: "data-message"
  log_level: "info"

schema:
  signal_api_url: "str"
  signal_account: "str"
  server_address: "str"
  repeat_last_message: "bool"
  record_message_type: "list(receipt|typing|data|data-message|sync)"
  log_level: "list(trace|debug|info|warning|error|fatal)"
